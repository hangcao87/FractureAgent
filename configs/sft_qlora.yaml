# QLoRA SFT — matches §5 of the paper.
model_name: Qwen/Qwen2.5-7B-Instruct   # paper used "Qwen3.5-9B"; set to your available Qwen-family instruct ckpt
output_dir: outputs/sft
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none
  task_type: CAUSAL_LM
train:
  num_train_epochs: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8        # effective batch 32 on 2xA100
  bf16: true
  gradient_checkpointing: true
  max_seq_length: 4096
  logging_steps: 20
  save_strategy: epoch
  eval_strategy: epoch
  report_to: none
data:
  train_file: data/processed/sft_train.jsonl
  val_file: data/processed/sft_val.jsonl
  # loss is computed ONLY on assistant Thought/Action/Response spans (Eq 7);
  # user turns and tool Observations are masked. See train/train_sft.py.
