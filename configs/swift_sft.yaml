# ms-swift 4.x YAML configuration.
# MODEL_PATH must point to a locally obtained compatible base model. No project
# checkpoint is downloaded by this configuration.
model: ${MODEL_PATH}
dataset: data/processed/train_swift.jsonl
val_dataset: data/processed/dev_swift.jsonl
output_dir: outputs/fractureagent_swift_lora
tuner_type: lora
quant_method: bnb
quant_bits: 4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
torch_dtype: bfloat16
num_train_epochs: 4
learning_rate: 0.0002
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 32
warmup_ratio: 0.03
max_length: 4096
logging_steps: 10
save_steps: 250
save_total_limit: 2
eval_strategy: steps
eval_steps: 250
gradient_checkpointing: true
bf16: true
seed: 2026
save_safetensors: true
report_to: none
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
